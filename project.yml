name: Jyra
options:
  bundleIdPrefix: com.jyra
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16"
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Jyra:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Jyra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jyra.app
        INFOPLIST_FILE: Jyra/Info.plist
        CODE_SIGN_ENTITLEMENTS: Jyra/Jyra.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - sdk: Charts.framework

schemes:
  Jyra:
    build:
      targets:
        Jyra: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
